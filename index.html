
<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>লগইন | স্প্ল্যাশ স্ক্রিন</title>
    <style>
        /* ----- রিসেট ও বেসিক ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        /* ========= ১. স্প্ল্যাশ স্ক্রিন (২ সেকেন্ড ধরে থাকবে) ========= */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            z-index: 100000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s ease-out;
            opacity: 1;
        }

        .splash-screen img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* স্প্ল্যাশ ফেড আউট হওয়ার পর */
        .splash-screen.fade-out {
            opacity: 0;
            pointer-events: none;
        }
        
        /* সম্পূর্ণ লুকানোর জন্য */
        .splash-screen.hidden {
            display: none;
        }

        /* ========= ২. লোডার (ইউজার চেক করার সময়) ========= */
        .loading {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            flex-direction: column;
        }

        /* Uiverse loader animation */
        .loading svg polyline {
            fill: none;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .loading svg polyline#back {
            stroke: #ff4d5033;
        }

        .loading svg polyline#front {
            stroke: #ff4d4f;
            stroke-dasharray: 48, 144;
            stroke-dashoffset: 192;
            animation: dash_682 1.4s linear infinite;
        }

        @keyframes dash_682 {
            72.5% { opacity: 0; }
            to { stroke-dashoffset: 0; }
        }
        
        .loading p {
            color: white;
            margin-top: 12px;
            font-weight: 500;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        /* ========= ৩. ব্যাকগ্রাউন্ড ভিডিও ========= */
        #bgVideo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
            filter: brightness(0.7);
        }

        /* ========= ৪. লগইন বক্স (আপনার মূল ডিজাইন অনুযায়ী) ========= */
        .box {
            margin-left: 550px;
            margin-top: 300px;
            height: auto;
            width: 300px;
            position: fixed;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            padding: 5%;
            border-style: solid;
            border-width: 0.5px;
            border-radius: 20px;
            border-color: black;
            box-shadow: 5px 5px 15px black;
            z-index: 10;
        }
        
        marquee {
            display: block;
            margin-bottom: 15px;
            font-family: inherit;
            color: #fff;
            font-weight: 500;
            text-shadow: 1px 1px 2px black;
        }
        
        .input {
            height: 25px;
            width: 200px;
            border: solid black 0.5px;
            border-radius: 10px;
            background-color: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            padding: 0 8px;
            font-size: 14px;
            color: #fff;
        }
        
        .input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }
        
        .input:focus {
            outline: none;
            border-color: #ff4d4f;
        }
        
        .submit {
            height: 30px;
            width: 60px;
            background-color: red;
            border: solid 0.5px red;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.1s;
            color: white;
        }
        
        .submit:active {
            background: blue;
            transform: scale(0.96);
        }

        /* সাউন্ড বাটন */
        #soundBtn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(5px);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 0 10px black;
            z-index: 50;
            transition: 0.2s;
            color: white;
        }
        
        #soundBtn:active {
            transform: scale(0.92);
        }

        /* রেস্পন্সিভ - আপনার মূল কোডের মতো */
        @media (max-width: 480px) {
            .box {
                margin-left: 16%;
                padding: 5%;
                margin-top: 40%;
                position: fixed;
                width: 200px;
            }
            .input {
                width: 100%;
            }
            .submit {
                width: 60px;
            }
            #soundBtn {
                width: 45px;
                height: 45px;
                font-size: 22px;
                top: 15px;
                right: 15px;
            }
        }
        
        /* ট্যাবলেটের জন্য কিছু অ্যাডজাস্ট */
        @media (min-width: 481px) and (max-width: 768px) {
            .box {
                margin-left: 30%;
                margin-top: 40%;
                width: 220px;
            }
        }
        
        /* ছোট ল্যাপটপের জন্য */
        @media (min-width: 769px) and (max-width: 1024px) {
            .box {
                margin-left: 35%;
                margin-top: 30%;
            }
        }
    </style>
</head>
<body>

    <!-- ========= স্প্ল্যাশ স্ক্রিন (মোবাইল sp1.jpg / ডেস্কটপ sp2.jpg) ========= -->
    <div id="splashScreen" class="splash-screen">
        <img id="splashImg" alt="splash screen">
    </div>

    <!-- ========= লোডার (API কলের সময়) ========= -->
    <div class="loading" id="loader">
        <svg width="64px" height="48px">
            <polyline points="0.157 23.954, 14 23.954, 21.843 48, 43 0, 50 24, 64 24" id="back"></polyline>
            <polyline points="0.157 23.954, 14 23.954, 21.843 48, 43 0, 50 24, 64 24" id="front"></polyline>
        </svg>
        <p>ভেরিফাই করা হচ্ছে...</p>
    </div>

    <!-- ব্যাকগ্রাউন্ড ভিডিও -->
    <video autoplay muted loop id="bgVideo">
        <source src="naruto for bg.mp4" type="video/mp4">
    </video>

    <!-- সাউন্ড কন্ট্রোল বাটন -->
    <div id="soundBtn" onclick="toggleSound()">🔇</div>

    <!-- লগইন বক্স - আপনার মূল ডিজাইন সম্পূর্ণ অপরিবর্তিত রাখা হয়েছে -->
    <div class="box">
        <marquee direction="scroll">
            একটি সঠিক ইউজার আইডি দিয়ে লগইন করুন। যদি ইউজার আইডি না থাকে তবে (saad@saad) লিখে লগইন করে রেজিস্ট্রেশ করুন।
        </marquee>
        <input type="password" id="input" class="input" placeholder="সঠিক ইউজার আইডি দিন" required>
        <br><br>
        <input type="submit" value="log in" id="butn" onclick="saad()" class="submit">
    </div>

    <!-- অডিও এলিমেন্ট -->
    <audio id="bgMusic" autoplay muted loop>
        <source src="music1.mp3" type="audio/mpeg">
    </audio>

    <script>
        // ---------- ১. স্প্ল্যাশ স্ক্রিন: মোবাইলে sp1.jpg, পিসি/ল্যাপটপে sp2.jpg, ২ সেকেন্ড ধরে থাকবে ----------
        
        // স্প্ল্যাশ ইমেজ সেট করা
        function setSplashImage() {
            const splashImg = document.getElementById('splashImg');
            
            // ডিভাইস টাইপ চেক (মোবাইল vs ডেস্কটপ/ল্যাপটপ)
            let isMobile = false;
            
            // ১. স্ক্রিনের প্রস্থ চেক
            if (window.innerWidth <= 768) {
                isMobile = true;
            }
            
            // ২. ইউজার এজেন্ট চেক (অতিরিক্ত নির্ভুলতার জন্য)
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            if (/android|iphone|ipad|ipod|blackberry|iemobile|opera mini/i.test(userAgent.toLowerCase())) {
                isMobile = true;
            }
            
            // মোবাইল ফোন হলে sp1.jpg, নাহলে sp2.jpg
            const splashImageURL = isMobile ? "sp1.jpg" : "sp2.jpg";
            splashImg.src = splashImageURL;
            
            // ইমেজ লোড হওয়ার পর ২ সেকেন্ড অপেক্ষা করে ফেইড আউট শুরু
            if (splashImg.complete) {
                // ইমেজ আগেই লোড হয়ে থাকলে
                setTimeout(() => fadeOutSplash(), 2000); // ২ সেকেন্ড ধরে রাখা
            } else {
                splashImg.onload = () => {
                    setTimeout(() => fadeOutSplash(), 2000); // ২ সেকেন্ড ধরে রাখা
                };
                splashImg.onerror = () => {
                    console.warn("স্প্ল্যাশ ইমেজ লোড হয়নি, তবুও ২ সেকেন্ড পর ফেইড আউট");
                    setTimeout(() => fadeOutSplash(), 2000);
                };
            }
        }
        
        function fadeOutSplash() {
            const splash = document.getElementById('splashScreen');
            if (splash) {
                splash.classList.add('fade-out');
                // ফেইড আউট সম্পূর্ণ হলে স্প্ল্যাশ ডিভাইসটি লুকিয়ে ফেলা
                setTimeout(() => {
                    splash.classList.add('hidden');
                }, 600); // 0.6 সেকেন্ড পরে hidden ক্লাস যোগ
            }
        }
        
        // ---------- ২. সাউন্ড টগল ----------
        function toggleSound() {
            const music = document.getElementById("bgMusic");
            const btn = document.getElementById("soundBtn");
            if (!music) return;
            
            if (music.muted) {
                music.muted = false;
                btn.innerHTML = "🔊";
                music.play().catch(e => console.log("অডিও প্লে ব্যর্থ:", e));
            } else {
                music.muted = true;
                btn.innerHTML = "🔇";
            }
        }
        
        // ---------- ৩. API কল এবং ইউজার ভ্যালিডেশন (আপনার মূল ফাংশন সেভ রাখা) ----------
        const apiURL = "https://script.google.com/macros/s/AKfycbwZ7vsFRGKf5K5UVFSmlHNDuu_svUiwq-7TGybxDIjx9bS5mixp7k0AdXrDTwxNfg-j/exec";
        
        async function saad() {
            const inputField = document.getElementById("input");
            const inputValue = inputField.value.trim();
            const loaderDiv = document.getElementById("loader");
            
            if (!inputValue) {
                alert("ইউজার আইডি দিন!");
                inputField.focus();
                return;
            }
            
            // বিশেষ কেস: saad@saad
            if (inputValue === "saad@saad") {
                window.location.href = "https://www.facebook.com/Username.SaadSikder";
                return;
            }
            
            loaderDiv.style.display = "flex";
            
            try {
                const response = await fetch(apiURL);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const users = await response.json();
                
                let isValidUser = false;
                if (Array.isArray(users)) {
                    isValidUser = users.includes(inputValue);
                } else if (typeof users === 'object' && users !== null) {
                    const userArray = users.users || Object.values(users);
                    if (Array.isArray(userArray)) {
                        isValidUser = userArray.includes(inputValue);
                    }
                }
                
                if (isValidUser) {
                    window.location.href = "second.html";
                } else {
                    loaderDiv.style.display = "none";
                    alert("ইউজার খুজে পাওয়া যাচ্ছে না! দয়া করে সঠিক তথ্য দিয়ে লগইন করুন।");
                    inputField.value = "";
                    inputField.focus();
                }
            } catch (error) {
                loaderDiv.style.display = "none";
                alert("সার্ভারের সাথে সংযোগ করা যাচ্ছে না!");
                console.error(error);
            }
        }
        
        // ---------- ৪. অডিও ফার্স্ট ইন্টারঅ্যাকশন হেল্পার ----------
        function enableAudioOnFirstInteraction() {
            const music = document.getElementById("bgMusic");
            if (!music) return;
            
            const enableAudio = () => {
                if (music.muted) {
                    music.muted = false;
                    music.play().catch(e => console.log("auto resume failed", e));
                    // সাউন্ড বাটনের আইকনও আপডেট করি
                    const btn = document.getElementById("soundBtn");
                    if (btn && btn.innerHTML === "🔇") {
                        btn.innerHTML = "🔊";
                    }
                }
                document.removeEventListener("click", enableAudio);
                document.removeEventListener("touchstart", enableAudio);
            };
            
            document.addEventListener("click", enableAudio);
            document.addEventListener("touchstart", enableAudio);
        }
        
        // ---------- ৫. পেজ লোড হলে সব কিছু শুরু ----------
        window.addEventListener("DOMContentLoaded", () => {
            // স্প্ল্যাশ ছবি সেট করা (মোবাইল/ডেস্কটপ অনুযায়ী)
            setSplashImage();
            
            // ভিডিও প্লে করা
            const video = document.getElementById("bgVideo");
            if (video) {
                video.play().catch(e => console.log("ভিডিও অটোপ্লে:", e));
            }
            
            // অডিও ফার্স্ট ইন্টারঅ্যাকশন হ্যান্ডলার
            enableAudioOnFirstInteraction();
            
            // এন্টার কী সাপোর্ট
            const inputEl = document.getElementById("input");
            if (inputEl) {
                inputEl.addEventListener("keypress", function(event) {
                    if (event.key === "Enter") {
                        event.preventDefault();
                        const submitBtn = document.getElementById("butn");
                        if (submitBtn) submitBtn.click();
                    }
                });
            }
        });
        
        // গ্লোবাল ফাংশন এক্সপোজ
        window.saad = saad;
        window.toggleSound = toggleSound;
    </script>
</body>
</html>
