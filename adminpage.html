<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body { font-family: Arial, sans-serif; text-align: center; padding: 50px; }
      .upload-btn { padding: 10px 20px; background: #4285F4; color: white; border: none; cursor: pointer; }
      #msg { margin-top: 20px; color: green; font-weight: bold; }
    </style>
  </head>
  <body>
    <h2>আমার পার্সোনাল ড্রাইভ আপলোডার</h2>
    <input type="file" id="file" accept="image/*,video/*">
    <br><br>
    <button class="upload-btn" onclick="upload()">ড্রাইভে পাঠান</button>
    <p id="msg"></p>

    <script>
      function upload() {
        var fileInput = document.getElementById('file');
        if (fileInput.files.length === 0) {
          alert("দয়া করে একটি ফাইল সিলেক্ট করুন!");
          return;
        }

        var file = fileInput.files[0];
        var msg = document.getElementById('msg');
        msg.innerHTML = "আপলোড হচ্ছে, দয়া করে অপেক্ষা করুন...";
        msg.style.color = "blue";

        var reader = new FileReader();
        reader.onload = function(e) {
          var data = e.target.result;
          google.script.run.withSuccessHandler(function(res) {
            msg.innerHTML = res;
            msg.style.color = "green";
            fileInput.value = ''; // ক্লিয়ার করে দেওয়া
          }).uploadFile(data, file.name);
        };
        reader.readAsDataURL(file);
      }
    </script>
  </body>
</html>
