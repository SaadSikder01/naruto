<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>গুগল শিট লগার</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f7f6; margin: 0; }
        .box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        input { padding: 12px; width: 85%; border: 2px solid #ddd; border-radius: 6px; margin-bottom: 20px; font-size: 16px; outline: none; }
        input:focus { border-color: #007bff; }
        button { background: #007bff; color: white; border: none; padding: 12px; width: 93%; border-radius: 6px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #msg { margin-top: 15px; font-size: 14px; color: #555; }
    </style>
</head>
<body>

<div class="box">
    <h2>শিটে নাম যোগ করুন</h2>
    <input type="text" id="userName" placeholder="এখানে নাম লিখুন">
    <button id="addBtn" onclick="sendData()">Add Name</button>
    <p id="msg"></p>
</div>

<script>
    // আপনার প্রাপ্ত Web App URL টি নিচের ইনভার্টেড কমার ভেতরে বসান
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyW5rGAXU2JIG9C-7-AgAUEIgyJrRwgbxsACts5518TMXM9ndMSJlmWsNUq7xQqiQ4Pcg/exec";

    function sendData() {
        const nameInput = document.getElementById('userName');
        const msg = document.getElementById('msg');
        const btn = document.getElementById('addBtn');
        const name = nameInput.value.trim();

        if (!name) {
            alert("দয়া করে একটি নাম লিখুন!");
            return;
        }

        msg.innerText = "শিটে পাঠানো হচ্ছে...";
        msg.style.color = "blue";
        btn.disabled = true;

        fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({ name: name }),
            headers: { "Content-Type": "text/plain;charset=utf-8" }
        })
        .then(response => response.json())
        .then(result => {
            if (result.status === "success") {
                msg.innerText = "সফলভাবে শিটে জমা হয়েছে!";
                msg.style.color = "green";
                nameInput.value = ""; 
            } else {
                msg.innerText = "সার্ভার এরর: " + result.message;
                msg.style.color = "red";
            }
            btn.disabled = false;
        })
        .catch(error => {
            // অনেক সময় রিডাইরেক্টের কারণে এরর দেখালেও ডাটা শিটে জমা হয়
            msg.innerText = "রিকোয়েস্ট পাঠানো হয়েছে। শিট চেক করুন!";
            msg.style.color = "orange";
            btn.disabled = false;
            console.error('Error!', error.message);
        });
    }
</script>

</body>
</html>
