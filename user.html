<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>user manage</title>
    <style>
        /* ডিজাইন অংশ */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background-color: #f0f2f5; 
            margin: 0; 
        }
        .container { 
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
            text-align: center; 
            width: 350px; 
        }
        h2 { color: #1DB954; margin-bottom: 25px; }
        input { 
            padding: 12px; 
            width: 90%; 
            border: 2px solid #ddd; 
            border-radius: 8px; 
            font-size: 16px; 
            margin-bottom: 20px; 
            outline: none; 
            transition: 0.3s;
        }
        input:focus { border-color: #1DB954; }
        button { 
            padding: 12px 25px; 
            background: #1DB954; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold; 
            width: 100%; 
            transition: 0.3s; 
        }
        button:hover { background: #1aa34a; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { margin-top: 20px; font-size: 14px; min-height: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Add user</h2>
    <input type="text" id="userName" placeholder="আপনার নাম লিখুন...">
    <button id="addBtn" onclick="sendToSheet()">Add To DataBase</button>
    <div id="status">নাম লিখে বাটনে ক্লিক করুন</div>
</div>

<script>
    // আপনার প্রাপ্ত Google Web App URL টি এখানে বসান
    const scriptURL = "https://script.google.com/macros/s/AKfycbwqNbmU6POfXBjh1Ma2h5pyjNVrrbpc4fSiUCOExK7xwVsb2JdK8-2ClflmzUmVWOkf/exec";

    function sendToSheet() {
        const nameInput = document.getElementById('userName');
        const status = document.getElementById('status');
        const btn = document.getElementById('addBtn');
        const name = nameInput.value.trim();

        if (!name) {
            alert("দয়া করে একটি নাম লিখুন!");
            return;
        }

        // লোডিং মেসেজ
        status.innerText = "Adding to DataBase...";
        status.style.color = "blue";
        btn.disabled = true;

        // ডেটা পাঠানো
        fetch(scriptURL, {
            method: "POST",
            body: JSON.stringify({ name: name }),
            headers: {
                "Content-Type": "text/plain;charset=utf-8"
            }
        })
        .then(res => res.json())
        .then(data => {
            if(data.status === "success") {
                status.innerText = "সফলভাবে জমা হয়েছে!";
                status.style.color = "green";
                nameInput.value = ""; // ক্লিয়ার করা
            } else {
                status.innerText = "সার্ভার এরর: " + data.message;
                status.style.color = "red";
            }
            btn.disabled = false;
        })
        .catch(err => {
            // অনেক সময় রিডাইরেক্টের কারণে এরর আসলেও ডাটা জমা হয়
            status.innerText = "User Added!";
            status.style.color = "orange";
            btn.disabled = false;
            console.error(err);
        });
    }
</script>

</body>
</html>
